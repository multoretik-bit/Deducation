<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Education | Universal Learning System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">D-EDUCATION</div>
            <nav id="main-nav" style="display: flex; gap: 2rem;">
                <a href="#" onclick="app.showDashboard()" style="color: var(--text-primary); text-decoration: none; font-weight: 700;">Панель</a>
                <a href="#" onclick="app.showProfile()" style="color: var(--text-secondary); text-decoration: none; font-weight: 700;" id="profile-link">Профиль</a>
            </nav>
            <div id="progress-info" style="font-size: 0.9rem; color: var(--text-secondary);">
                Progress: <span id="total-progress">0%</span>
            </div>
        </header>

        <div id="dashboard" class="animate">
            <section class="hero">
                <h1>Твой интеллект в 2026.</h1>
                <p>Научно обоснованная система ускоренного обучения самым важным навыкам будущего.</p>
            </section>
            <div class="dashboard-grid" id="module-grid"></div>
        </div>

        <div id="profile-view" class="animate" style="display: none;">
            <section class="hero">
                <h1>Твой Профиль</h1>
                <p>Управление обучением и твоё расписание на неделю.</p>
            </section>
            
            <div class="dashboard-grid">
                <div class="card" style="grid-column: span 1; cursor: default;">
                    <h3 style="margin-bottom: 2rem;">🗓️ Расписание на неделю</h3>
                    <div id="weekly-schedule" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Will be populated by JS -->
                    </div>
                </div>
                <div class="card" style="cursor: default;">
                    <h3 style="margin-bottom: 1.5rem;">🔥 Активные курсы</h3>
                    <ul id="active-courses-list" style="list-style: none;">
                        <!-- Will be populated by JS -->
                    </ul>
                </div>
            </div>
        </div>

        <div id="module-view" class="animate">
            <button class="btn-back" onclick="app.showDashboard()">← Назад к панели</button>
            <div id="module-content"></div>
        </div>
    </div>

    <script src="modules/data_v2.js"></script>
    <script src="app_v2.js"></script>
</body>
</html>
</body>
</html>
